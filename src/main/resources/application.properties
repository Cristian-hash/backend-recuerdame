# ==============================================================
# ?? CONFIGURACIÓN PROYECTO: UPGRADE-ERP (Core API)
# ==============================================================
server.port=8080
spring.application.name=upgrade-core-api

# ==============================================================
# ?? CONEXIÓN A BASE DE DATOS (PostgreSQL)
# ==============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/upgrade_db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================================
# ? JPA / HIBERNATE (El traductor Java <-> SQL)
# ==============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================================================
# ? FLYWAY (Constructor Automático de Tablas)
# ==============================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ==============================================================
# ?? SEGURIDAD JWT (Antigravity Security)
# ==============================================================
security.jwt.secret=EscribeAquiUnaClaveSuperSecretaYLargaQueNadiePuedaAdivinarParaTuProyectoUpgrade123456
security.jwt.expiration-ms=86400000

# ==============================================================
# ? SWAGGER (Documentación API)
# ==============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs

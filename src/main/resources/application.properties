# ==============================================================
# ?? CONFIGURACIÓN PROYECTO: UPGRADE-CORE-API
# ==============================================================
server.port=8080
spring.application.name=upgrade-core-api

# ==============================================================
# ?? CONEXIÓN A BASE DE DATOS (PostgreSQL)
# ==============================================================
# OJO: Asegúrate de crear una base de datos vacía llamada 'upgrade_db' en tu Postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/upgrade_db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================================
# ? JPA / HIBERNATE (El traductor Java <-> SQL)
# ==============================================================
# 'validate' revisa que Java coincida con la BD. No crea tablas (eso lo hace Flyway).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================================================
# ? FLYWAY (Constructor Automático de Tablas)
# ==============================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ==============================================================
# ?? SEGURIDAD JWT (Antigravity Security)
# ==============================================================
# IMPORTANTE: Esta clave debe ser MUY larga (mínimo 64 caracteres) para HS512
# Puedes generar una escribiendo letras al azar en tu teclado ahora mismo.
security.jwt.secret=EscribeAquiUnaClaveSuperSecretaYLargaQueNadiePuedaAdivinarParaTuProyectoUpgrade123456
security.jwt.expiration-ms=86400000 
# (86400000 ms = 24 horas)

# ==============================================================
# ? SWAGGER (Documentación API)
# ==============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html